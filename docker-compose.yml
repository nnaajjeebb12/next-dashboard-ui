version: '0.0.1'

services:
  postgres:
    image: postgres:17
    container_name: postgres_db
    environment:
      POSTGRES_USER: najeeb12
      POSTGRES_PASSWORD: Plutonium_239
      POSTGRES_DB: school
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    container_name: school_app
    ports:
      - 3000:3000
    environment:
      POSTGRES_USER: postgresql://najeeb12:Plutonium_239@localhost:5432/school
    depends_on:
      - postgres
