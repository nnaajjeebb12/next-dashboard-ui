version: '1'

services:
  postgres:
    image: postgres:17.4
    container_name: postgres_db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: school
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: school_app
    ports:
      - 3000:3000
    environment:
      DATABASE_URL: postgresql://myuser:mypassword@postgres:5432/school
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_bGVhZGluZy1hbGllbi01MC5jbGVyay5hY2NvdW50cy5kZXYk
      CLERK_SECRET_KEY: sk_test_wGzQtoErzU2ec2tkBH10cjdSYECO6gk3sFiGuBUBIn
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: vaghnlawrence
      NEXT_PUBLIC_CLOUDINARY_API_KEY: 452922187849588
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
